methodology_summary: >
  Multi-signal ranking system scoring candidates across 5 dimensions:
  skills match (30%), career quality (25%), role fit (20%), behavioral
  signals (15%), and location (10%). Uses keyword + proficiency-weighted
  skill scoring, honeypot detection via timeline/title contradiction
  checks, and behavioral signal analysis from platform activity.
  No GPU, no API calls. Full 100K run completes in under 5 minutes.